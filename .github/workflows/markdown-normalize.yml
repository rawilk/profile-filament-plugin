name: Normalize Markdown

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/markdown-normalize.yml'

permissions:
  contents: write

jobs:
  normalize:
    timeout-minutes: 1
    runs-on: ubuntu-latest

    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Prettify markdown
        uses: creyD/prettier_action@v4.6
        with:
          prettier_options: --write **/*.md
